name: Build & Release

on:
  pull_request:
    types: [closed]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version tag (e.g. v0.1.1). Leave empty to auto-compute from latest git tag."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.version_override }}" ]; then
            TAG="${{ github.event.inputs.version_override }}"
          else
            LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
            if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
            if echo "$LABELS" | grep -qw "major"; then
              TAG="v$((MAJOR+1)).0.0"
            elif echo "$LABELS" | grep -qw "minor"; then
              TAG="v${MAJOR}.$((MINOR+1)).0"
            else
              TAG="v${MAJOR}.${MINOR}.$((PATCH+1))"
            fi
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Computed version: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already exists, skipping"
          git push origin ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already pushed, skipping"

      - name: Create GitHub Release
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
          version: ${{ steps.version.outputs.tag }}
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
